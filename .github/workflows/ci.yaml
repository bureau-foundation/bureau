name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # Sigstore keyless signing for provenance attestations

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, build, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Configure Nix binary cache
        run: |
          cat <<'EOF' | sudo tee /etc/nix/nix.custom.conf
          trusted-users = root runner
          accept-flake-config = true
          extra-substituters = https://cache.infra.bureau.foundation
          extra-trusted-public-keys = cache.infra.bureau.foundation-1:3hpghLePqloLp0qMpkgPy/i0gKiL/Sxl2dY8EHZgOeY= cache.infra.bureau.foundation-2:e1rDOXBK+uLDTT+YU2UzIzkNHpLEaG2jCHZumlH1UmY=
          EOF
          sudo systemctl restart nix-daemon

      - name: Warm Nix dev shell
        run: nix develop --command true

      # Go module cache for ci-lint (go vet, golangci-lint download modules).
      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.sum') }}-
            go-${{ runner.os }}-

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk-cache
          key: bazel-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'go.mod') }}-${{ github.sha }}
          restore-keys: |
            bazel-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel', 'go.mod') }}-
            bazel-${{ runner.os }}-

      - name: Lint and format checks
        run: nix develop --command script/ci-lint

      - name: Gazelle freshness check
        run: nix develop --command script/check-gazelle

      - name: Build
        run: nix develop --command bazel build --config=ci //...

      - name: Test
        run: nix develop --command bazel test --config=ci //...

      - name: Binary size check
        run: nix develop --command script/check-binary-sizes

      - name: Build Nix packages
        run: nix build

      - name: Push to Nix binary cache
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          echo "${{ secrets.NIX_CACHE_SIGNING_KEY }}" > /tmp/nix-signing-key
          trap 'rm -f /tmp/nix-signing-key' EXIT

          CACHE="s3://bureau-cache?endpoint=${{ secrets.R2_ENDPOINT }}&region=auto"

          # Build all binary packages. bureau-host-env and bureau-sandbox-env
          # pull in all host and sandbox binaries as dependencies. The four
          # remaining binaries (agents and test agent) are built individually.
          nix build --no-link \
            .#bureau-host-env \
            .#bureau-sandbox-env \
            .#bureau-agent .#bureau-agent-claude .#bureau-agent-mock .#bureau-test-agent

          # Sign and push host environment (includes all host binaries).
          nix store sign --key-file /tmp/nix-signing-key -r .#bureau-host-env
          nix copy --to "$CACHE" .#bureau-host-env

          # Sign and push sandbox environment (includes all sandbox binaries).
          nix store sign --key-file /tmp/nix-signing-key -r .#bureau-sandbox-env
          nix copy --to "$CACHE" .#bureau-sandbox-env

          # Sign and push agent and test binaries not in the environments.
          for extra in bureau-agent bureau-agent-claude bureau-agent-mock bureau-test-agent; do
            nix store sign --key-file /tmp/nix-signing-key -r ".#$extra"
            nix copy --to "$CACHE" ".#$extra"
          done

          # Sign and push dev shell closure.
          nix build --no-link .#devShells.x86_64-linux.default
          nix store sign --key-file /tmp/nix-signing-key -r .#devShells.x86_64-linux.default
          nix copy --to "$CACHE" .#devShells.x86_64-linux.default

      - name: Generate provenance attestations
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        uses: ./.github/actions/attest-nix-paths
        with:
          flake-outputs: >-
            bureau
            bureau-agent
            bureau-agent-claude
            bureau-agent-mock
            bureau-agent-service
            bureau-artifact-service
            bureau-bridge
            bureau-credentials
            bureau-daemon
            bureau-launcher
            bureau-log-relay
            bureau-observe-relay
            bureau-pipeline-executor
            bureau-proxy
            bureau-proxy-call
            bureau-sandbox
            bureau-test-agent
            bureau-ticket-service
            bureau-viewer
          cache-endpoint: ${{ secrets.R2_ENDPOINT }}
          cache-bucket: bureau-cache
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Prune Bazel cache
        if: always()
        run: |
          find ~/.cache/bazel-disk-cache -type f -atime +7 -delete 2>/dev/null || true
          du -sh ~/.cache/bazel-disk-cache 2>/dev/null || echo "Cache empty"
